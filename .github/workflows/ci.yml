name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  # pgTAP no Postgres local do Supabase CLI — cobre RPCs, RLS e o payload do
  # snapshot (publish_reconciliation_test.sql), que não rodam sem Docker.
  test-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinado: merge gate não pode flutuar com releases do CLI (o default
          # do action, 2.20.x, já quebrou uma vez com "invalid keys" no
          # config.toml). Bump deliberado em PR próprio.
          version: 2.109.1
      # Espelhos de deploy manual (docs/deploy/N) precisam ser byte-idênticos
      # às migrações (fora o cabeçalho de 2 linhas) — o SQL Editor de produção
      # aplica o espelho, e um drift instalaria uma função divergente.
      - name: Espelhos de deploy em sincronia com as migrações
        run: |
          diff <(tail -n +3 docs/deploy/8-selo-reconciliacao.sql) supabase/migrations/20260716000100_reconciliation_snapshot.sql
          diff <(tail -n +3 docs/deploy/9-grants-data-api.sql) supabase/migrations/20260716000300_grants_data_api.sql
      - run: supabase db start
      - run: supabase test db

  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint the code
        run: pnpm lint

      # - name: Analyze unused files and dependencies
      #   run: pnpm knip

      - name: Run Prettier check
        run: pnpm format:check

      - name: Install browsers
        run: pnpm test:browser:install

      - name: Run tests
        run: pnpm test

      - name: Build the project
        run: pnpm build
