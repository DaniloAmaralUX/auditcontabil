<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<title>Progresso · Espaço Ação</title>
<style>
  :root {
    --bg: #0f1115; --card: #171a21; --line: #262b36;
    --text: #f2f4f8; --dim: #9aa3b2;
    --done: #34d399; --doing: #60a5fa; --todo: #4b5563;
    --accent: #ee7d2b; --bordo: #8a3a40;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f7f8fa; --card: #ffffff; --line: #e5e8ee;
      --text: #14171d; --dim: #5b6470;
      --done: #059669; --doing: #2563eb; --todo: #9ca3af;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 18px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 24px; max-width: 880px; margin: 0 auto;
  }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  header svg { flex-shrink: 0; }
  header .brand b { display: block; font-size: 14px; letter-spacing: .14em; color: var(--dim); }
  header .brand span { font-size: 22px; font-weight: 800; }

  #now {
    background: linear-gradient(135deg, var(--bordo), #5d262b);
    color: #fff; border-radius: 16px; padding: 22px 24px; margin-bottom: 18px;
  }
  #now .tag { font-size: 13px; font-weight: 700; letter-spacing: .1em; opacity: .8; }
  #now .msg { font-size: 26px; font-weight: 800; line-height: 1.25; margin-top: 6px; }
  #now .when { font-size: 14px; opacity: .75; margin-top: 10px; }

  #bar-wrap { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px 20px; margin-bottom: 18px; }
  #bar-label { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 10px; }
  #bar { height: 18px; background: var(--line); border-radius: 999px; overflow: hidden; }
  #bar > div { height: 100%; width: 0%; border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--done)); transition: width .6s ease; }

  .group { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 16px 18px; margin-bottom: 14px; }
  .group h2 { font-size: 17px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .group h2 small { color: var(--dim); font-weight: 600; }
  .item { display: flex; align-items: center; gap: 10px; padding: 7px 4px; font-size: 16px; }
  .item + .item { border-top: 1px dashed var(--line); }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .done .dot { background: var(--done); }
  .doing .dot { background: var(--doing); animation: pulse 1.4s ease-in-out infinite; }
  .todo .dot { background: transparent; border: 2px solid var(--todo); }
  .done { color: var(--dim); }
  .done .label { text-decoration: line-through; text-decoration-thickness: 1px; }
  .doing .label { font-weight: 700; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(1.35); opacity: .55 } }
  @media (prefers-reduced-motion: reduce) { .doing .dot { animation: none } }

  footer { text-align: center; color: var(--dim); font-size: 14px; padding: 16px 0 8px; }
</style>
</head>
<body>
  <header>
    <svg width="44" height="42" viewBox="0 0 160 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Espaço Ação">
      <g transform="rotate(-20 78 82)"><path d="M 8 82 A 70 26 0 0 1 148 82" fill="none" stroke="#EE7D2B" stroke-width="7" stroke-linecap="round" opacity="0.9"/></g>
      <path fill="#8a3a40" fill-rule="evenodd" d="M79 16 L138 140 L20 140 Z M79 70 L102 122 L56 122 Z"/>
      <g transform="rotate(-20 78 82)"><path d="M 148 82 A 70 26 0 0 1 8 82" fill="none" stroke="#EE7D2B" stroke-width="8" stroke-linecap="round"/><circle cx="148" cy="82" r="7" fill="#EE7D2B"/></g>
    </svg>
    <div class="brand"><b>ESPAÇO AÇÃO</b><span>Progresso do projeto</span></div>
  </header>

  <section id="now">
    <div class="tag">AGORA</div>
    <div class="msg" id="now-msg">Carregando…</div>
    <div class="when" id="now-when"></div>
  </section>

  <section id="bar-wrap">
    <div id="bar-label"><span>Progresso geral</span><span id="bar-count">–</span></div>
    <div id="bar"><div id="bar-fill"></div></div>
  </section>

  <main id="groups"></main>

  <footer>Atualiza sozinho a cada 20 segundos · <span id="foot-when"></span></footer>

<script>
  const STATES = { done: 'done', doing: 'doing', todo: 'todo' }
  async function load() {
    try {
      const res = await fetch('./status.json?t=' + Date.now())
      const data = await res.json()
      render(data)
    } catch (e) { /* mantém o último estado na tela */ }
  }
  function render(data) {
    document.getElementById('now-msg').textContent = data.now
    const when = new Date(data.updatedAt)
    const whenTxt = 'Atualizado às ' + when.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) +
      ' de ' + when.toLocaleDateString('pt-BR')
    document.getElementById('now-when').textContent = whenTxt
    document.getElementById('foot-when').textContent = whenTxt

    let done = 0, total = 0
    const groupsEl = document.getElementById('groups')
    groupsEl.innerHTML = ''
    for (const g of data.groups) {
      const gDone = g.items.filter(i => i.state === 'done').length
      done += gDone; total += g.items.length
      const sec = document.createElement('section')
      sec.className = 'group'
      const h = document.createElement('h2')
      h.innerHTML = `<span>${g.title}</span><small>${gDone}/${g.items.length}</small>`
      sec.appendChild(h)
      for (const item of g.items) {
        const div = document.createElement('div')
        div.className = 'item ' + (STATES[item.state] || 'todo')
        div.innerHTML = `<span class="dot" aria-hidden="true"></span><span class="label"></span>`
        div.querySelector('.label').textContent =
          (item.state === 'doing' ? '👉 ' : '') + item.label
        sec.appendChild(div)
      }
      groupsEl.appendChild(sec)
    }
    const pct = total ? Math.round((done / total) * 100) : 0
    document.getElementById('bar-fill').style.width = pct + '%'
    document.getElementById('bar-count').textContent = `${done} de ${total} · ${pct}%`
  }
  load()
  setInterval(load, 20000)
</script>
</body>
</html>
