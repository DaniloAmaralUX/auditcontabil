<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/images/favicon_light.svg"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon.png"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/favicon_light.png"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>AuditView · Auditoria contábil visual</title>
    <meta name="title" content="AuditView · Auditoria contábil visual" />
    <meta
      name="description"
      content="Transforme o balancete do seu cliente em uma auditoria contábil visual — importe, revise, compartilhe."
    />
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://auditcontabil.vercel.app/" />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AuditView" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://auditcontabil.vercel.app/" />
    <meta property="og:title" content="AuditView · Auditoria contábil visual" />
    <meta
      property="og:description"
      content="Transforme o balancete do seu cliente em uma auditoria contábil visual — importe, revise, compartilhe."
    />
    <meta
      property="og:image"
      content="https://auditcontabil.vercel.app/images/favicon.png"
    />

    <!-- Twitter card (também consumido por outros clientes que preferem twitter:*) -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AuditView · Auditoria contábil visual" />
    <meta
      name="twitter:description"
      content="Transforme o balancete do seu cliente em uma auditoria contábil visual — importe, revise, compartilhe."
    />
    <meta
      name="twitter:image"
      content="https://auditcontabil.vercel.app/images/favicon.png"
    />

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />

    <meta name="theme-color" content="#fff" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
